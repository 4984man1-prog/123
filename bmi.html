<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #7c2d12, #431407);
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 20px;
    }
    .card {
      width: 340px;
      background: #431407;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(67, 20, 7, 0.6);
      color: #fff7ed;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #fdba74;
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #fdba74;
      margin-bottom: 6px;
    }
    .field { margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #5b2110;
      color: #fff7ed;
      font-size: 18px;
      outline: none;
    }
    input:focus { box-shadow: 0 0 0 2px #f97316; }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #f97316;
      color: #431407;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: filter 0.15s, transform 0.05s;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.97); }
    .result {
      margin-top: 24px;
      text-align: center;
      min-height: 80px;
    }
    .result .value {
      font-size: 44px;
      font-weight: 700;
    }
    .result .category {
      font-size: 18px;
      font-weight: 600;
      margin-top: 4px;
    }
    .result .desc {
      font-size: 13px;
      color: #fdba74;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>BMI 계산기</h1>
    <p class="subtitle">키와 몸무게로 체질량지수를 계산합니다</p>

    <div class="field">
      <label for="height">키 (cm)</label>
      <input type="number" id="height" placeholder="예: 170" inputmode="decimal">
    </div>
    <div class="field">
      <label for="weight">몸무게 (kg)</label>
      <input type="number" id="weight" placeholder="예: 65" inputmode="decimal">
    </div>

    <button id="calcBtn">계산하기</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const heightEl = document.getElementById("height");
    const weightEl = document.getElementById("weight");
    const resultEl = document.getElementById("result");

    // 대한비만학회 기준(아시아-태평양)
    function classify(bmi) {
      if (bmi < 18.5)  return { label: "저체중",   color: "#60a5fa", desc: "체중을 늘리는 것이 좋습니다." };
      if (bmi < 23)    return { label: "정상",     color: "#4ade80", desc: "건강한 체중 범위입니다." };
      if (bmi < 25)    return { label: "과체중",   color: "#facc15", desc: "체중 관리에 주의하세요." };
      if (bmi < 30)    return { label: "비만 1단계", color: "#fb923c", desc: "식습관과 운동을 점검하세요." };
      if (bmi < 35)    return { label: "비만 2단계", color: "#f87171", desc: "전문가 상담을 권장합니다." };
      return { label: "비만 3단계", color: "#ef4444", desc: "전문적인 관리가 필요합니다." };
    }

    function calculate() {
      const h = parseFloat(heightEl.value);
      const w = parseFloat(weightEl.value);

      if (!h || !w || h <= 0 || w <= 0) {
        resultEl.innerHTML = '<div class="desc">키와 몸무게를 올바르게 입력하세요.</div>';
        return;
      }

      const m = h / 100;
      const bmi = w / (m * m);
      const rounded = Math.round(bmi * 10) / 10;
      const c = classify(bmi);

      resultEl.innerHTML =
        '<div class="value" style="color:' + c.color + '">' + rounded + '</div>' +
        '<div class="category" style="color:' + c.color + '">' + c.label + '</div>' +
        '<div class="desc">' + c.desc + '</div>';
    }

    document.getElementById("calcBtn").addEventListener("click", calculate);
    [heightEl, weightEl].forEach(el =>
      el.addEventListener("keydown", e => { if (e.key === "Enter") calculate(); })
    );
  </script>
</body>
</html>
